## Tool Implementation Location

Tools are implemented in: `backend/src/agent/tools.py`

Each tool is an async function:
```python
async def create_task(title: str, description: str = None) -> ToolResult:
    ...

async def get_tasks(status: str = None) -> ToolResult:
    ...

async def update_task(task_id: int, fields: dict) -> ToolResult:
    ...

async def delete_task(task_id: int) -> ToolResult:
    ...
```

---

## Testing Requirements

Each tool must have:

1. **Success path tests**: Verify correct API call and response parsing
2. **Error path tests**: Verify error handling for 404, 400, 500 responses
3. **Connection error tests**: Verify handling of backend unavailability
4. **Parameter validation tests**: Verify parameter validation before API call

Test location: `backend/tests/agent/test_tools.py`

